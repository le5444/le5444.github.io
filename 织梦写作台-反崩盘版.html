要求：
- 不要平铺直叙，一定要有「挫折-反转」或「推-拉」的顿挫感。
- 给出每个节拍建议的字数占比。`,tags:["情绪流","场景设计","拉扯","欲扬先抑"]},{id:"writers-block-rescue",title:"卡文急救包：打破僵局",category:"卡文急救",content:`我写小说卡文了。现在的剧情很平淡，或者我不知道该怎么接下去了。请帮我打破僵局。

【当前状态】
前文提要：[简述最近发生的事，比如“主角刚打完比赛，回到宗门休息”]
卡文原因：[例如：感觉太水了没意思/不知道下个目标是什么/支线太乱收不回来]

【请提供 3 种破局方案】

方案A（外力介入/突发事件）：
- 搁置现有平淡矛盾，突然插入一个极其紧迫的外部危机。
- 这个危机必须逼迫主角立刻行动。

方案B（新人物搅局）：
- 引入一个意料之外的新人物（或让某个老角色以新身份回归）。
- 这个人物的出现必须瞬间打乱主角原有的计划。

方案C（主角失控/反向操作）：
- 让主角因为某个底线被触碰，或者因为金手指的副作用，做出一个完全不按常理出牌的举动。
- 引发意想不到的连锁反应。

请详细描述每种方案的具体事件，以及它能引出的后续主线。`,tags:["卡文","急救","灵感","突发事件"]},{id:"villain",title:"反派深度设计",category:"角色设定",content:`请设计一个有深度不扁平的反派：

【表面层】
姓名/身份/实力：[基本信息]
对主角做的事：[具体罪行]
读者的第一印象：[为什么恨他]

【中间层】
动机：[他为什么这么做——要有合理理由]
背景故事：[是什么让他变成这样]
他与主角的镜像关系：[他和主角哪里相似，哪里相反]

【深层】
他自认为的正义：[他觉得自己的行为是合理的]
他的人性残留：[他还在乎什么——某个人/某个信念]
救赎可能性：[能否被救赎/什么情况可能改变他]

【在故事中的作用】
前期：[对主角的压迫方式]
中期：[他的势力/计划逐渐揭露]
后期：[最终对决的情感意义——不只是打架]`,tags:["反派","动机","深度"]},{id:"character-voice",title:"角色声音差异化",category:"角色设定",content:`请帮我为以下角色设计独特的说话风格，确保每个角色声音可区分：

【角色列表】
1. [角色A]：[身份/性格]
2. [角色B]：[身份/性格]
3. [角色C]：[身份/性格]

【设计要求】
每个角色的声音由以下维度定义：
- 词汇水平：简单/中等/高深/专业术语
- 句子长度：短促/中等/冗长
- 口头禅/惯用语：[具体]
- 情绪表达方式：直接/含蓄/反讽/沉默
- 说话节奏：快/慢/停顿多

【验证方法】
用同一个场景测试：让三个角色分别说「我不同意」——写出三种完全不同的表达方式。`,tags:["对话","声音","差异化"]},{id:"show-dont-tell",title:"展示而非讲述：情感改写",category:"场景描写",content:`请将以下「讲述型」文字改写成「展示型」文字：

【原文】
[贴入你的原文——包含抽象情感描述，如「他很生气」「她很难过」]

【改写要求】
1. 删除所有抽象情绪形容词（生气、难过、害怕、开心...）
2. 用具体的动作、身体反应、感官细节代替
3. 通过环境描写暗示情绪
4. 让读者自己推断角色的感受

【示例】
❌ 他很生气 → ✅ 他捏碎了手里的玻璃杯，碎片扎进掌心，血顺着指缝滴落，他却浑然不觉
❌ 她很难过 → ✅ 她把脸埋进膝盖，肩膀一抽一抽的。窗外的雨越下越大，像她怎么都流不完的眼泪`,tags:["描写","情感","技巧"]},{id:"sensory-detail",title:"五感沉浸描写",category:"场景描写",content:`请为以下场景加入五感细节，让读者身临其境：

【场景】[描述你要写的场景]

【要求】
每个重要场景至少包含3种感官：
- 视觉：颜色、光影、形状、动态
- 听觉：声音、寂静、回声、节奏
- 嗅觉：气味、味道、空气质感
- 触觉：温度、质地、触感
- 味觉：味道、口感、回味（如适用）

【过滤词检查】
删除以下创造距离的词汇：
看到、听到、感觉到、闻到、尝到、意识到、注意到、似乎、知道

【示例】
❌ 他走进房间，感觉很冷 → ✅ 推开门，一股寒气扑面而来。壁炉里的灰烬早已凉透，空气中弥漫着潮湿的霉味。他的指尖触到门把手，金属的冰凉让他缩了一下手。`,tags:["五感","沉浸","细节"]},{id:"dialogue-subtext",title:"对话潜台词设计",category:"场景描写",content:`请为以下对话场景设计潜台词：

【场景背景】[描述对话发生的背景和人物关系]
【表面话题】[他们在表面上讨论什么]
【真实意图】[每个人真正想表达什么]

【设计要求】
1. 角色A说的每句话都有第二层意思
2. 角色B可能听懂了，也可能没听懂
3. 用动作和神态代替部分对话
4. 避免「As you know, Bob」式 exposition

【潜台词技巧】
- 话只说一半
- 移花接木（用比喻替换直白表达）
- 木马计（把真正意图藏在不相干的信息中）
- 沉默和停顿比说话更有力量`,tags:["对话","潜台词","技巧"]},{id:"face-slap",title:"装逼打脸七步法",category:"战斗/打脸",content:`请按以下七步法写一个打脸场景：

【场景设定】
地点：[如：高档酒店/拍卖会场/家族宴会]
在场人物：
- 主角：[姓名]，表面身份[卑微身份]，真实身份[惊人身份]
- 反派：[姓名]，[身份]，正在当众羞辱/轻蔑主角
- 关键人物：[姓名]，即将揭示主角真实身份的人
- 围观群众：[描述]

【七步结构】
第一步：铺垫 — 反派当众羞辱主角，周围人附和嘲笑
第二步：低调 — 主角默不作声或淡然处之（不是怂，是不屑）
第三步：起势 — 关键人物/事件出现，气氛开始转变
第四步：揭秘 — 主角的真实身份/实力被揭露
第五步：震惊 — 所有人的反应描写（多角度）：反派脸色惨白、围观者目瞪口呆、知情者跪地求饶
第六步：碾压 — 主角轻描淡写地解决一切（越是轻松，装逼效果越好）
第七步：余韵 — 事后众人的议论/反刍，强化爽感

【台词要求】
- 反派嘲讽的话要足够嚣张
- 关键人物揭示身份的话要有重量感
- 主角最后的话要轻描淡写但杀人诛心`,tags:["打脸","装逼","爽点"]},{id:"battle-1vn",title:"一对多碾压战斗",category:"战斗/打脸",content:`请写一场主角一人碾压多人的战斗场景：

【战斗背景】
对手：[人数]人，[实力等级]，[特殊能力]
主角：[当前实力]，[核心战斗方式]
战斗目的：[保护某人/立威/争夺资源/复仇]

【写作要求】
1. 用短句和动词制造节奏感
2. 每个对手的倒下方式要有变化（不能千篇一律）
3. 穿插围观者的反应
4. 主角可以受伤但要帅气
5. 战斗结束后让围观者重新评估主角的地位

【节奏公式】
对峙 → 对手先出手 → 主角轻松化解 → 对手震惊 → 主角反击 → 逐个击倒 → 最后一人求饶/逃跑 → 战后余波`,tags:["战斗","碾压","节奏"]},{id:"battle-even",title:"势均力敌激战",category:"战斗/打脸",content:`请写一场势均力敌的战斗：

【要求】
1. 双方都要展示实力（让对方成为好的对手）
2. 三回合交锋：试探→全力交锋→绝招对决
3. 主角在战斗中突破/领悟新能力（战斗中成长）
4. 胜利要有代价（受伤/消耗/牺牲）
5. 战斗结束后要有战略层面的影响（局势变化）

【回合设计】
第一回合（试探）：双方互相摸底，展示基础能力
第二回合（全力）：各自拿出真本事，场面升级
第三回合（决胜）：绝招对轰，主角在关键时刻突破

【描写重点】
- 招式名称要帅
- 每次交锋要有策略变化
- 环境破坏要跟上战斗强度
- 观战者的反应要层层递进`,tags:["战斗","势均力敌","突破"]},{id:"cliffhanger-info",title:"信息揭露型留扣",category:"章末留扣",content:`请为以下场景设计信息揭露型章末留扣：

【场景】[描述当前章节结尾的情况]

【留扣模板】
"他打开了那个尘封十年的盒子。
里面躺着的东西，让他整个人僵在原地。"

【变体】
- 反转预告型："如果他知道这一去意味着什么，他一定不会迈出那一步。"
- 危机预告型："就在这时，他听到了那个声音。那个他以为永远不会再听到的声音。"
- 身份暗示型："多年后，当他站在万界之巅，回想起这一天发生的一切，他才明白——命运的齿轮，从这一刻开始转动。"

【设计要求】
1. 必须让读者产生「我必须看下一章」的冲动
2. 不要过度剧透，只揭露一部分信息
3. 可以是一个画面、一句话、一个动作
4. 控制在2-3句话以内`,tags:["悬念","章末","留扣"]},{id:"cliffhanger-battle",title:"战斗中断型留扣",category:"章末留扣",content:`请写一个战斗中断型章末留扣：

【场景】主角正在与强敌激战，胜负未分

【写法】
在战斗最激烈的瞬间戛然而止：
- 主角的绝招即将命中/被命中
- 突然出现的第三方势力
- 某个关键人物的意外举动
- 环境突变（建筑倒塌/天象异变）

【示例】
"那一剑，凝聚了他全部的修为。
剑光如虹，直取对方咽喉。
——就在剑尖触及皮肤的瞬间，一道黑影从天而降，挡在了两人之间。
'住手。'
那个声音，让[主角名]的手猛然一颤。
因为他认得这个声音。
那是他以为已经死了十年的人。"

【禁忌】
- 不要在平淡的场景强行留扣
- 不要每次都用同样的留扣方式
- 留扣后下一章开头要快速兑现，不要吊太久`,tags:["悬念","战斗","中断"]},{id:"system-design",title:"系统流金手指完整设计",category:"金手指设计",content:`请为我设计一个完整的系统流金手指：

【基本属性】
系统名称：[名字]
绑定方式：[触发条件]
核心功能：[功能1]、[功能2]、[功能3]
能量/货币：[积分/点数/能量]的获取方式

【成长体系】
第一阶段（前100章）：基础功能 [功能列表]
第二阶段（100-300章）：解锁 [进阶功能]
第三阶段（300-500章）：解锁 [高级功能]
隐藏功能：[需要特定条件触发]

【限制条件】
使用代价：[代价1]、[代价2]
冷却限制：[时间/次数限制]
功能禁区：[什么情况下系统无法使用]
惩罚机制：[失败/违规的惩罚——必须具体可感知]

【主线任务】
新手任务：[任务描述] → 奖励：[奖励内容]
进阶任务（3个）：[递增难度]
终极任务：[贯穿全书的目标]

【系统来源之谜】
表面：[最初的理解]
中期线索：[发现系统并非那么简单]
真相：[系统的真正来源和目的——用作中后期大剧情]`,tags:["系统","金手指","设定"]},{id:"golden-finger-principles",title:"金手指设计五原则",category:"金手指设计",content:`请根据以下五原则，评估并优化我的金手指设定：

【我的金手指】[描述你目前的金手指]

【评估标准】
1. 扩展性 > 一次性
   - 金手指可以不断开发新功能吗？
   - 同一个功能可以有多种用法吗？

2. 表面弱者实质强者
   - 看起来不起眼，用起来逆天？
   - 读者会觉得「这也能行？」然后被惊艳到？

3. 成长性 > 一次性
   - 金手指随主角成长而成长？
   - 分期付款代替一次性支付？

4. 新颖的 > 老套的
   - 在经典基础上有微创新？
   - 不是简单的「最强系统」「无敌外挂」？

5. 限制是精华
   - 有明确的代价和限制？
   - 限制推动剧情发展而不是单纯为难主角？

【优化建议】
请针对每条原则给出评分（1-10）和具体优化建议。`,tags:["金手指","原则","评估"]},{id:"xianxia-system",title:"玄幻修仙：升级体系设计",category:"各类型专项",content:`请设计一套完整的修仙升级体系：

【境界设定】（10个境界，每境界3小阶）
境界1：[名称] — 特征：[寿命/新增能力/标志性技能]
境界2：[名称] — 特征：[...]
...（以此类推）

【突破条件】
- 资源需求：[每境界需要什么资源/丹药]
- 感悟要求：[需要悟到什么]
- 契机：[机缘/战斗/生死关头]

【战力划分】
同境界内：普通/精英/天才/妖孽/绝世的战力对比

【修炼流派】
- [流派1]：[特点/擅长/代表人物]
- [流派2]：[特点/擅长/代表人物]
- [流派3]：[特点/擅长/代表人物]

【世界势力格局】
- 顶级势力：[名称/实力范围/对主角的态度]
- 敌对势力：[名称/冲突原因]
- 中立势力：[可能的盟友]

【地图递进】
新手村 → 宗门范围 → 王朝疆域 → 大陆格局 → 诸天万界 → 混沌神域`,tags:["玄幻","修仙","体系"]},{id:"urban-identity",title:"都市文：身份反差设计",category:"各类型专项",content:`请为都市文设计主角的「多重身份」体系：

【隐藏身份层级】
第1层（日常伪装）：[职业：外卖员/实习生/赘婿/学生]
第2层（初步揭露）：[身份：神医/金融天才/黑客高手]
第3层（核心身份）：[身份：隐世宗门传人/战神/财阀继承人]
第4层（终极身份）：[身份：让整个世界都颤抖的存在]

【身份揭露节奏】
前50章：展示第1-2层（解决小麻烦）
50-150章：第3层身份开始浮出水面（参与大事件）
150-300章：第4层身份逐渐揭露（对弈全局）

【人际关系网】
- 需要保护的人：[家人/爱人/朋友]
- 得力下属：[忠诚度/能力/加入过程]
- 对手：[从地方到国际，层层升级]

【经典开局】
- 赘婿开局：结婚三年被岳母赶出家门，妻子递上离婚协议。第二天，国际财团CEO跪在他面前叫「少主」。
- 兵王开局：从尸山血海中归来的兵王，只想在都市过平凡生活。直到有人动了他的家人。`,tags:["都市","赘婿","身份"]},{id:"reborn-money",title:"重生年代文：发财线设计",category:"各类型专项",content:`请为重生年代文设计发财线：

【重生时间节点】[如：1978年/1985年/1990年/2000年]
【主角前世的遗憾】[具体描写]

【第一阶段】原始积累（1-30章）
利用方式1：[利用重生的信息差——具体操作]
利用方式2：[...]
第一桶金的数额和使用：[具体]

【第二阶段】产业初建（30-100章）
进入的行业：[为什么选这个行业]
竞争优势：[前世经验/先知先觉]
遇到的第一个大危机：[具体] → 化解方式：[具体]

【第三阶段】产业升级（100-200章）
从[单个产业]扩展到[产业链/多元化]
开始影响时代格局
社会责任线：[带动就业/改变行业/回馈社会]

【感情线】
与事业线交织推进，利用前世记忆挽回遗憾`,tags:["重生","年代","创业"]},{id:"romance-sweet",title:"言情甜宠：糖分场景",category:"各类型专项",content:`请写一段甜宠场景：

【人设】
男主：[霸道总裁/高冷学神]，平时对所有人[冷漠/疏离]，唯独对女主[温柔/占有欲强]
女主：[软萌/沙雕/独立]，[特征]

【场景】[如：女主生病，男主放下重要会议飞奔回家照顾]

【要求】
1. 男主的反差感要拉满（对外冷酷对内温柔）
2. 细节比台词更重要（手背试体温/掖被角/默默守着）
3. 不要直接说「我爱你」——用行动诠释
4. 加入至少一个让读者发出尖叫的细节
5. 对话要有潜台词，不要直白

【甜度控制】
- 微甜：一个关心的眼神/动作
- 中甜：暧昧的肢体接触/吃醋
- 高糖：直球表白/甜蜜互动/撒狗粮`,tags:["言情","甜宠","糖分"]},{id:"infinite-dungeon",title:"无限流：副本设计",category:"各类型专项",content:`请设计一个无限流副本：

【副本基本信息】
名称：[副本名]
类型：[恐怖/竞技/解密/生存/...]
难度：[星级/等级]
参与人数：[人数]
通关条件：[明确规则]
失败惩罚：[具体惩罚]

【副本结构】
阶段1（铺垫/入场）：[玩家面临的初始情况]
阶段2（第一次尝试）：[玩家的初步应对 + 遭遇挫折]
阶段3（关键信息）：[主角发现的隐藏规则/线索]
阶段4（破局）：[利用关键信息反败为胜]
阶段5（结算）：[奖励获取 + 能力提升]

【副本独特元素】
核心诡计/反转：[让这个副本与众不同的设计]
隐藏奖励：[需要特殊条件触发]
与其他副本的关联：[为后续副本埋线索]

【七种经典场景参考】
1. 恐怖医院 — 生存+解密
2. 废弃学校 — 灵异+规则怪谈
3. 生死游戏 — 竞技+淘汰
4. 历史事件 — 在历史事件中完成任务
5. 童话黑化 — 经典童话的黑暗版本
6. 循环时间 — 不断重复某一天直到找到真相
7. 密室逃脱 — 纯解密+细节观察`,tags:["无限流","副本","设计"]},{id:"palace-intrigue",title:"宫斗/宅斗：计谋设计",category:"各类型专项",content:`请为宫斗文设计一个连环计谋：

【目标】
除掉的对象：[嫡姐/贵妃/...]
原因：[威胁到主角什么]

【信息收集阶段】
主角掌握的情报：[具体]
主角的暗线/棋子：[谁，能提供什么帮助]

【连环计布局】
第一步（试探）：[看似无意的一个动作/一句话]
第二步（诱导）：[让目标主动走入陷阱]
第三步（收网）：[多方证据同时爆发]
第四步（补刀）：[让目标没有翻身的可能]

【计谋的反转点】
在执行过程中遇到的意外：[具体]
主角的应变：[展示主角的急智]

【计谋结果】
对主角的影响：[地位变化/势力变化/他人态度变化]
对后续剧情的影响：[引出更大的矛盾]

【斗法层次递进】
低级：言语交锋、暗讽、小绊子
中级：设局陷害、挑拨离间、借刀杀人
高级：连环计、舆论操控、让对手自己走向毁灭
终极：利用皇权/族规进行降维打击`,tags:["宫斗","宅斗","计谋"]},{id:"ai-workflow",title:"AI辅助写作工作流",category:"AI工作流",content:`请按照以下工作流，用AI辅助完成小说创作：

【阶段一：构思】人主导 70% + AI 30%
- 你自己确定：核心创意、主角人设、世界观框架
- AI辅助：生成多个创意变体、完善设定细节、检查逻辑漏洞
- 提示词：「基于以下设定，帮我完善世界观细节，检查是否有逻辑矛盾：[你的设定]」

【阶段二：大纲】人主导 60% + AI 40%
- 你自己确定：主线走向、关键转折点、结局
- AI辅助：细化每章剧情点、设计爽点节奏、优化结构
- 提示词：「基于以下主线，帮我设计前20章的详细大纲，每章包含：核心事件+爽点类型+章末悬念：[你的主线]」

【阶段三：初稿】人主导 50% + AI 50%
- AI生成：过渡章节、环境描写、战斗场面
- 你自己写：核心对话、情感戏、关键转折点
- 提示词：「按照以下大纲，写第X章（3000字）。要求：[具体风格要求]。前文：[贴入前文]」

【阶段四：修改】人主导 80% + AI 20%
- AI辅助：检查逻辑漏洞、润色语言、检查人设一致性
- 你自己：调整情绪节奏、深化人物、优化爽点
- 提示词：「请检查以下章节的人物一致性、逻辑漏洞，并给出修改建议：[贴入章节]」

【核心原则】
AI是助手，不是代笔。灵魂和创意必须来自你。`,tags:["AI","工作流","方法论"]},{id:"ai-iteration",title:"三轮迭代优化法",category:"AI工作流",content:`请用以下三轮迭代法优化小说内容：

【第一轮：逻辑通顺】
目标：把故事讲完整，逻辑自洽
AI提示词：
「请检查以下内容的逻辑连贯性：
1. 情节是否有因果断裂？
2. 人物行为是否符合其性格和动机？
3. 时间线和因果关系是否清晰？
4. 是否有未解释的设定或突兀的转折？

[贴入你的内容]

请列出所有逻辑问题，并给出修改建议。」

【第二轮：对话雕琢】
目标：让每个角色的说话方式符合身份
AI提示词：
「请优化以下对话，要求：
1. 每个角色的说话方式要符合其身份和性格
2. 删除直白的陈述句，增加潜台词
3. 用动作和神态代替部分对话标签
4. 确保每句对话推动剧情或塑造人物关系

[贴入对话段落]」

【第三轮：文笔修饰】
目标：加入感官细节，让文字有画面感
AI提示词：
「请重写以下段落，要求：
1. 删除所有抽象的情绪形容词
2. 用视觉、听觉、嗅觉三种感官细节重新构建场景
3. 增加具体的动作和微表情描写
4. 保持简洁，不要过度堆砌辞藻

[贴入段落]」`,tags:["AI","迭代","优化"]},{id:"ai-character-prompt",title:"AI角色深度设定提示词",category:"AI工作流",content:`忘掉之前所有的设定，现在你是一位资深小说家，我们要依据著名的冰山理论，来完善角色。

根据我提供的基础标签，推导一个具体的角色的潜意识恐惧和核心欲望。
不要直接罗列属性，要用行为片段展现这些性格特点。

【基础标签】
姓名：[名字]
年龄：[年龄]
职业：[职业]
表面性格：[3个关键词]

【请输出】
1. 潜意识恐惧：[角色内心深处最害怕的东西]
2. 核心欲望：[角色真正想要但自己可能都没意识到的东西]
3. 行为片段（3个）：
   - 片段1：展示角色在面对[某种情况]时的真实反应
   - 片段2：展示角色在[某种关系]中的行为模式
   - 片段3：展示角色在[压力之下]的选择
4. 语言特征：[角色的说话风格、口头禅、用词习惯]
5. 微表情/小动作：[角色在紧张/开心/愤怒时的下意识反应]

请确保所有内容都通过「展示」而非「讲述」来呈现。`,tags:["AI","角色","冰山理论"]},{id:"ai-sensory-prompt",title:"AI感官注入提示词",category:"AI工作流",content:`请重写刚才那段描写。

要求：
1. 删掉所有抽象的情绪形容词
2. 用视觉、听觉、嗅觉这三种感官细节重新构建场景
3. 不要写「他很生气」，要写「他捏碎了手里的玻璃杯，碎片扎进了手掌」
4. 保持简洁，每句都要有信息量
5. 段落控制在150字以内，适合手机阅读

【原文】
[贴入你的原文]

【输出要求】
- 只输出修改后的内容
- 不要添加新的情节
- 保持原有的故事走向和人物关系`,tags:["AI","感官","改写"]},{id:"title-gen-male",title:"男频爆款书名生成",category:"书名简介",content:`请为我的男频小说生成10个爆款书名：

【小说信息】
类型：[玄幻/都市/重生/系统/...]
主角身份：[废柴少年/赘婿/退役兵王/...]
金手指：[系统/传承/重生记忆/...]
核心爽点：[逆袭/打脸/碾压/装逼/...]

【书名公式（请混合使用）】
公式A：[时间状态]+[身份]+[金手指]+[结果]
  例：重生后我手撕渣男逆袭成首富
公式B：[开局]+[极端处境]+[反转]
  例：开局签到荒古圣体
公式C：[身份反差]+[震惊句式]
  例：赘婿莫欺少年穷
公式D：[否定句式]+[悬念]
  例：我真不是大佬啊

【要求】
- 10-18字以内
- 包含核心卖点和情绪冲击力
- 一眼就能看出爽点在哪
- 适合番茄/起点的读者群`,tags:["书名","男频","生成"]},{id:"title-gen-female",title:"女频爆款书名生成",category:"书名简介",content:`请为我的女频小说生成10个爆款书名：

【小说信息】
类型：[古言/现言/穿书/重生/...]
女主类型：[大女主/甜宠/虐恋/宫斗/...]
男主类型：[霸总/战神/高冷/忠犬/...]
核心看点：[甜宠/复仇/逆袭/虐恋/宅斗/...]

【书名公式（请混合使用）】
公式A：[女主身份]+[动作]+[男主身份]
  例：嫡长女今天登基了吗
公式B：[重生/穿书]+[反套路]+[结果]
  例：重生后我成了反派他妈
公式C：[关系]+[反差/冲突]
  例：将军夫人手撕白莲花
公式D：[极端处境]+[逆袭]
  例：被休后我惊艳了全京城

【要求】
- 8-16字以内
- 暗示核心CP和情感走向
- 一看就想点进去
- 适合番茄/晋江的读者群`,tags:["书名","女频","生成"]},{id:"synopsis-gen",title:"小说简介生成（万能版）",category:"书名简介",content:`请为我的小说生成3个不同风格的简介（每个50-100字）：

【小说核心信息】
书名：[书名]
类型：[类型]
主角：[姓名+身份+特点]
金手指/核心能力：[描述]
核心矛盾/冲突：[一句话概括]
爽点/卖点：[核心吸引力]

【简介风格】
风格A「悬念型」：抛出最大的疑问，让读者好奇
  公式：[主角处境] + [转折/金手指] + [最大悬念]

风格B「爽点型」：直接展示最爽的部分
  公式：[身份反差] + [核心打脸/碾压场景] + [持续爽的暗示]

风格C「情感型」：打动读者情绪
  公式：[主角困境/遗憾] + [改变的契机] + [情感共鸣点]

【格式要求】
- 每段50-100字
- 用短句，节奏紧凑
- 最后一句必须是悬念/期待
- 不要剧透核心反转
- 适合手机端阅读（一屏能看完）`,tags:["简介","生成","万能"]},{id:"synopsis-tomato",title:"番茄小说简介优化",category:"书名简介",content:`请将我的小说简介优化为适合番茄小说平台的格式：

【原简介】
[贴入你的原简介]

【番茄简介公式】
第1句：身份反差/极端处境（抓眼球）
第2句：金手指/转折点（制造期待）
第3句：核心爽点场景（让读者想看）
第4句：悬念/未来展望（勾住不放）

【优化要求】
1. 总字数控制在60-80字
2. 每句话都是短句，不超过20字
3. 必须包含「爽点信号词」（如：震惊、跪了、逆天、碾压、打脸...）
4. 必须暗示主角会变强/逆袭
5. 结尾必须留悬念
6. 删除一切文学性描写，只保留信息量

【反面示例（不要这样写）】
"在这个波澜壮阔的世界里，少年怀揣着梦想踏上征程..."
→ 太空太泛，没有信息量

【正面示例】
"他是京城最窝囊的赘婿。一纸离婚协议递来，他默默签下。
第二天，五个大佬跪在他面前叫少主。
岳母傻了。"`,tags:["番茄","简介","优化"]},{id:"tomato-800",title:"番茄黄金800字优化",category:"番茄专项",content:`请将以下开篇优化为适合番茄小说的「黄金800字」：

【原文】
[贴入你的前800字]

【番茄黄金800字标准结构】
第1段（0-50字）：强冲突/强画面直接开场
  ✅ 刀架脖子/被退婚/濒死/被背叛
  ❌ 环境描写/内心独白/世界观介绍

第2-5段（50-300字）：快速交代核心信息
  ✅ 通过冲突带出身份背景
  ✅ 让读者知道主角是谁、处境如何
  ❌ 大段旁白解说

第6-10段（300-500字）：金手指激活
  ✅ 系统激活/传承获得/记忆觉醒
  ✅ 让读者产生「我要看他怎么翻身」的期待
  ❌ 金手指说明书式介绍

第11-15段（500-800字）：第一次使用+章末悬念
  ✅ 金手指首次生效，展示独特性
  ✅ 章末留强悬念
  ❌ 平淡收尾

【检查清单】
□ 50字内进入冲突？
□ 300字内知道主角是谁？
□ 500字内获得金手指？
□ 每段不超过150字？
□ 对话单独成段？
□ 章末有悬念？
□ 完读率预估 > 40%？`,tags:["番茄","800字","优化"]},{id:"tomato-chapter-end",title:"番茄章末钩子设计",category:"番茄专项",content:`请为以下章节设计5个不同类型的章末钩子（每章结尾必须有）：

【当前章节内容摘要】
[简述本章发生了什么]

【5种钩子类型】
1.「反转型」：本章看似尘埃落定，但最后一句暴露一个颠覆性信息
  例："但他不知道的是，那个他以为已经死去的人，此刻正站在他身后。"

2.「危机型」：新的更大危机突然降临
  例："就在他以为一切结束的时候，天边出现了一道裂缝。从裂缝中涌出的气息，让在场所有人同时变了脸色。"

3.「身份揭露型」：暗示某个角色的真实身份
  例："老者看着少年离去的背影，缓缓摘下面具。面具下的那张脸——如果有人看到，整个大陆都会地震。"

4.「选择型」：主角面临一个两难选择
  例："两条路摆在面前。左边是她，右边是天下。他知道，这一步迈出去，就再也回不了头了。"

5.「预言型」：暗示未来的重大事件
  例："多年后，所有人回忆起这个夜晚，都会说同一句话——一切，都从那一刻开始改变了。"

【要求】
- 每个钩子控制在2-4句话
- 必须让读者产生「我一定要看下一章」的冲动
- 适合番茄小说的短章节节奏（每章1500-2500字）`,tags:["番茄","钩子","章末"]},{id:"tomato-data-fix",title:"番茄数据不好？急救提示词",category:"番茄专项",content:`我的番茄小说数据不好，请帮我诊断并优化：

【当前数据】
点击率：[高/低]
黄金800字完读率：[百分比]
章节平均完读率：[百分比]
书架比：[比例]
7日留存率：[百分比]

【诊断规则】
IF 点击率低 → 书名/封面问题
  优化方向：重新设计书名（用爽点信号词+差异化+情绪词）

IF 黄金800字完读率 < 40% → 开篇问题
  优化方向：50字内进冲突、300字内展示金手指、删除环境描写

IF 章节完读率 < 35% → 节奏问题
  优化方向：每500字一个小事件、章末必须留扣、删除连续2000字无冲突

IF 书架比 > 5:1 → 吸引力不足
  优化方向：前10章加密爽点、每章至少1个信息增量

IF 7日留存 < 25% → 中期乏力
  优化方向：检查主线推进、是否有注水章节、爽点密度是否下降

【请根据我的数据给出】
1. 最可能的问题原因（排序）
2. 每个问题的具体优化方案
3. 需要重写/修改的具体章节建议
4. 优化后的预期数据变化`,tags:["番茄","数据","诊断"]},{id:"tomato-title-test",title:"番茄书名AB测试",category:"番茄专项",content:`请帮我对以下书名进行AB测试分析：

【候选书名】
A：[书名A]
B：[书名B]
C：[书名C]

【评估维度】（每项打分1-10）
1. 信息量：一眼能看出什么类型、什么爽点？
2. 情绪冲击：是否引发好奇/期待/震惊？
3. 差异化：是否与同类书名有区别？
4. 记忆度：是否好记好传？
5. 点击欲：你会不会想点进去看？
6. 番茄适配：是否符合番茄读者口味？

【输出格式】
| 维度 | 书名A | 书名B | 书名C |
|------|-------|-------|-------|
| 信息量 | X/10 | X/10 | X/10 |
...

总分 + 推荐理由 + 优化建议`,tags:["番茄","书名","测试"]},{id:"outline-20ch",title:"前20章详细大纲",category:"大纲设计",content:`请基于以下设定，为我设计前20章的详细大纲：

【核心设定】
一句话故事：[20字以内概括]
主角：[姓名+身份+金手指]
核心爽点：[爽点类型]
第一卷目标：[前20章要达成什么]

【每章大纲格式】
第X章 [章节标题]
- 核心事件：[这章发生了什么]
- 爽点类型：[打脸/升级/获宝/情感/揭秘/...]
- 新增信息：[读者在这章学到什么新东西]
- 章末悬念：[这章结尾的钩子]
- 字数建议：[1500-3000字]

【节奏要求】
- 第1-3章：黄金三章（冲突+金手指+第一次爽点）
- 第4-8章：第一个小副本/任务
- 第9-12章：第一个中高潮（大打脸/大战斗）
- 第13-16章：短暂低谷+新的目标引入
- 第17-20章：第二个高潮（更大的打脸/突破）

【检查】
□ 每章都有至少一个「变化」？
□ 没有连续3章无爽点？
□ 伏笔和悬念有跟踪？
□ 主角在成长而非原地踏步？`,tags:["大纲","20章","规划"]},{id:"outline-full",title:"全书大纲骨架",category:"大纲设计",content:`请帮我搭建全书大纲骨架：

【一句话故事】
[谁] + [想要什么] + [遇到什么阻碍] + [结果如何]

【四大支点】
起点：[主角的初始状态]
第一转折（25%）：[什么事件让主角踏上旅程]
中点（50%）：[什么事件彻底改变了局势]
高潮（90%）：[最终对决/最大危机]
结局：[新的平衡/主角的最终状态]

【分卷规划】
第一卷（1-X章）：[标题] — [核心事件] — [主角从A到B]
第二卷（X-Y章）：[标题] — [核心事件] — [主角从B到C]
第三卷（Y-Z章）：[标题] — [核心事件] — [主角从C到D]
...

【每卷需要包含】
- 本卷的核心矛盾是什么
- 本卷的大高潮是什么
- 本卷结束后主角成长了什么
- 承上启下的伏笔

【预估总字数】
短篇：30-50万字 / 中篇：80-150万字 / 长篇：200万字+`,tags:["大纲","全书","骨架"]},{id:"outline-chapter",title:"单章细纲（写前规划）",category:"大纲设计",content:`请帮我写第[X]章的写前细纲（写之前先规划）：

【前情回顾】
上一章结尾：[简述上章末尾发生了什么]
当前悬念：[读者目前最想知道什么]

【本章规划】
POV角色：[谁的视角]
场景地点：[在哪里]
时间：[什么时候]
本章目标：[这章要完成什么]

【节拍设计】
开头（300字）：[如何开场——紧接上章悬念]
发展1（500字）：[第一个事件/对话]
发展2（500字）：[第二个事件/冲突升级]
高潮（500字）：[本章的最high点]
收尾（200字）：[章末留扣]

【本章爽点】[具体的爽点设计]
【本章伏笔】[为后续埋什么伏笔]
【字数目标】[2000-3000字]`,tags:["细纲","单章","规划"]},{id:"book-analysis",title:"爆款书拆解分析",category:"拆书分析",content:`请帮我拆解分析以下爆款书的前10章：

【书籍信息】
书名：[书名]
作者：[作者]
平台：[起点/番茄/晋江/...]
数据：[追读/收藏/评分——如果知道的话]

【请分析以下维度】

1.【开篇钩子】前50字是如何抓住读者的？
2.【金手指节奏】金手指在第几章出现？如何逐步展开？
3.【爽点分布】每章的爽点类型是什么？密度如何？
4.【章末留扣】每章结尾用了什么钩子技巧？
5.【人设展示】主角的性格如何通过行动（而非描述）展现？
6.【反派设计】反派是如何铺垫和出场的？
7.【节奏曲线】画出前10章的「紧张度曲线」（高/中/低）
8.【信息控制】作者是如何控制信息披露节奏的？

【输出格式】
每章一行总结表：
| 章节 | 核心事件 | 爽点类型 | 章末钩子 | 紧张度 |
然后给出总结性的「可复用写作规律」`,tags:["拆书","分析","爆款"]},{id:"book-teardown-and-imitate",title:"金榜文精准拆解与仿写",category:"拆书分析",content:`你是一个精通中国网文套路的拆书专家。请帮我拆解以下金榜文的片段，并用它的结构写一段我的故事。

【参考片段】
[贴入你想学习的爆款小说片段 1000 字左右]

【我的故事设定】
[一句话描述你的主角、处境和你想写的情节]

【第一步：精准拆解】
请分析参考片段的：
1. 节奏比例：动作（%）+ 对话（%）+ 心理（%）+ 环境（%）
2. 爽点结构：它是如何铺垫（多少字） → 爆发（多少字） → 衔接钩子的？
3. 核心抓力：这个片段最吸引读者的本质情绪是什么？

【第二步：结构复刻】
请严格按照上面拆解出的「节奏比例」和「爽点结构」，用【我的故事设定】写一段 800-1000 字的正文。
要求：
- 只学骨架和节奏，不抄内容
- 保持相同的短句频率和情绪起伏`,tags:["拆书","仿写","节奏","金榜"]},{id:"style-imitate",title:"文风模仿提示词",category:"拆书分析",content:`请分析以下文本的写作风格，然后用相同风格帮我写一段新内容：

【参考文本】
[贴入你想模仿的作者的一段文字——500-1000字]

【请分析】
1. 句式特点：长句多还是短句多？
2. 词汇选择：口语化/文学化/专业化？
3. 节奏感：快节奏还是慢节奏？
4. 描写习惯：偏动作/偏心理/偏环境？
5. 对话风格：简洁/啰嗦/含蓄/直白？
6. 独特标志：这个作者有什么独特的写作习惯？

【然后请用这个风格写】
场景：[描述你要写的场景]
人物：[涉及的角色]
情绪：[要传达的情绪]
字数：[目标字数]

【重要】
- 模仿风格，不是抄袭内容
- 保留你故事的原创性
- 学习的是技法，不是故事`,tags:["文风","模仿","学习"]},{id:"minato-analysis-text",title:"MINATO 严苛测评（纯文字版・全 AI 适配）",category:"拆书分析",content:`请启动「严苛编辑模式」，严格遵循 MINATO ANALYSIS 专属分析体系，对指定小说文本开展全维度专业测评。
全程使用纯文字表述，禁止生成任何图片、雷达图、可视化图表，所有「图」一律用文字结构化复刻其逻辑。

【测评对象】
[在此粘贴正文片段、章节或整部作品]

【输出顺序与要求】

一、整体综合战力评分
- 给出一个 0-100 分的精准打分（例如 78/100）
- 一句话定性（例如：可签约水平 / 已具爆款潜力 / 仍在新手期）

二、文字版维度雷达拆解（共 16 项，每项 1-5 分，附 1-2 句打分依据）
1. 人物塑造
2. 结构复杂度
3. 情节反转密度
4. 情感穿透力
5. 文体魅力
6. 先锋性 / 实验性
7. 幽默感 / 自嘲力
8. 主题深度
9. 文化底蕴
10. 作者产出速度（从文本节奏推断）
11. 引用张力（互文性）
12. 谜团操控力与读者诱导性
13. 稳定性 / 完成度
14. 语言原创性
15. 经典性
16. 新锐性

输出格式建议：
[01] 人物塑造：4/5 — 主角动机清晰，反派略扁平
[02] 结构复杂度：3/5 — …
…依此类推到 [16]

三、四大文字评析板块（每板块 ≥ 3 条）
A. 作品核心概述
B. 核心优势亮点
C. 针对性改进建议（必须可执行，不许说「再打磨一下」这种空话）
D. 全局综合评价

四、文字层级框图（用 ASCII / 箭头 / 缩进表达，禁止图片）
1) 行动计划逻辑图（流程箭头式）：
   现状问题 → 短期改稿动作 → 中期结构调整 → 长期风格沉淀

2) 人物关系与技术影响图（节点 + 关联描述）：
   - [主角] —(对抗)→ [反派]
   - [主角] —(羁绊)→ [女主]
   - 写作技术影响：哪段技术问题影响了哪个人物的塑造效果

【文风约束】
- 客观、尖锐、严苛、中立
- 拒绝任何无意义美化，例如「整体不错」「很有潜力」这种废话
- 每一条改进建议必须落地、可执行
- 不要使用 Markdown 图片、emoji 装饰过度，专注文字结构本身`,tags:["MINATO","严苛测评","纯文字","拆书","雷达"]},{id:"continuation-prompt",title:"AI续写提示词（防跑偏）",category:"拆书分析",content:`忘掉之前所有设定。你是一位资深网文作者，文风精炼动人。

## 角色
你擅长用简短的对白、动作、描写呈现场景。撰写段落结尾不抒情，不写内心独白，不写展望未来，文末通常以人物动作结尾。

## 目标
按照「剧情走向」中的描述，在「前文段落」之后续写，保持一致的文风。

## 要求
1. 不输出前文段落，只输出续写内容
2. 每段不超过150字
3. 对话单独成段
4. 不使用「他感到」「她觉得」等过滤词
5. 用动作和细节代替情感描述
6. 字数：[目标字数]

## 前文段落
[贴入前文最后500-1000字]

## 剧情走向
[描述接下来要发生什么]

## 人物状态
[当前各角色的身体/心理/位置状态]

请开始续写。`,tags:["续写","防跑偏","AI"]},{id:"tomato-platform-adapter",title:"番茄平台特化改写",category:"平台特化",content:`请严格按番茄小说算法逻辑改写/生成以下内容：

【原文/设定】
[贴入正文片段、章节大纲或故事设定]

【番茄适配规则】
1. 前500字必须出现核心冲突/金手指/强悬念之一，禁止环境铺垫和背景说明超过100字
2. 每800-1000字必须有一个情绪起伏：打脸、收获、反转、危机、暧昧拉扯、身份暗示
3. 每章结尾最后50字必须留钩子：未解悬念/危机降临/身份暴露/选择困境
4. 删除慢热铺垫、群像闲聊、无效心理独白；主角必须主动推进
5. 每段不超过150字，对话单独成段，适合手机端滑动阅读
6. 语言直白、网感强、情绪明确，避免文艺腔

【输出】
- 先给出「番茄适配问题清单」
- 再给出「改写后正文/大纲」
- 最后给出「完读率风险提示」`,tags:["番茄","平台特化","完读率","改写"]},{id:"qidian-platform-adapter",title:"起点长篇留存适配",category:"平台特化",content:`请按起点长篇连载标准处理以下内容：

【文本/设定】
[贴入章节、设定或大纲]

【起点适配规则】
1. 保留世界观厚度，但必须通过主角行动、对话、冲突带出，禁止说明书式设定
2. 每3章埋1个伏笔，每10章回收1个伏笔，伏笔必须与主线/金手指/反派强相关
3. 战力体系必须递进，禁止长期无代价越级战；每次突破需资源、代价或契机
4. 配角应有独立动机，不能全员工具人
5. 每章必须有目标推进、信息增量或角色关系变化

【输出】
1. 起点读者可能喜欢的点
2. 起点读者可能弃书的点
3. 伏笔表：已埋/可埋/建议回收章节
4. 修改后的章节结构或正文`,tags:["起点","长篇","伏笔","留存"]},{id:"jjwxc-emotion-adapter",title:"晋江/女频情绪拉扯适配",category:"平台特化",content:`请按晋江/女频情绪逻辑优化以下内容：

【文本/设定】
[贴入章节、感情线大纲或角色关系]

【女频适配规则】
1. 感情线要有「试探—误解—靠近—退缩—保护—确认」的递进，不要突然撒糖
2. 女主必须有独立目标、事业线或成长线，不能只等男主救场
3. 男主动机必须自洽，不能为虐而虐、为甜而甜
4. 用细节写心动：眼神、停顿、动作、未说出口的话
5. 章末留情绪钩子：隐秘醋意、突然靠近、没说出口的真相、命运转折

【输出】
- 当前情绪张力评分（1-10）
- 拉扯不足的位置
- 可强化的暧昧/误会/保护场景
- 改写后的片段`,tags:["晋江","女频","情绪","拉扯"]},{id:"toxic-scan-rescue",title:"毒点扫描与急救",category:"毒点防御",content:`请以资深网文编辑身份，扫描以下文本的毒点：

【文本】
[贴入正文或大纲]

【致命毒点】
1. 主角憋屈/被动超过2章不反击
2. 反派降智、台词幼稚、强行送经验
3. 女主/男主倒贴、工具人化、缺乏独立人格
4. 战力体系崩坏，前期吹爆设定后期随便破
5. 连续500字无剧情推进或信息增量
6. 章末平淡收尾，无悬念、无转折、无情绪
7. 强行误会，一句话能解释却拖十几章
8. AI味重：机械句式、空泛抒情、重复表达

【输出格式】
- 🔴 致命毒点：位置 + 原因 + 修复优先级
- 🟡 高危毒点：位置 + 影响
- ✅ 保留亮点：哪些不要改
- ✍️ 修复稿：直接给出可替换文本
- 📈 预估：修改后对完读率/追更的帮助`,tags:["毒点","审稿","急救","完读率"]},{id:"single-chapter-3000-structure",title:"单章节奏3000字工业模板",category:"节奏切割",content:`请按以下3000字网文章节结构生成/重写：

【基础信息】
章节目标：[这一章要完成什么]
主角状态：[位置/情绪/实力/资源]
冲突对象：[反派/环境/任务/情感对象]
本章爽点：[打脸/收获/突破/暧昧/反转/揭秘]

【结构】
0-300字：开局抓人，直接切入冲突/危机/任务/金手指生效
300-1200字：发展对抗，主角尝试解决，遇到阻碍，压力上升
1200-2200字：小高潮，主角用智谋/金手指/行动破局，释放爽感
2200-2600字：余韵，获得资源、地位提升、新线索或情绪满足
2600-3000字：章末钩子，突发事件/身份暗示/更大危机/选择困境

【硬性要求】
1. 每段不超过150字
2. 对话单独成段
3. 每800字至少一次情绪转折
4. 结尾句必须制造「必须看下一章」的冲动
5. 不要解释规则，要用行动和冲突呈现

请直接输出章节正文。`,tags:["章节","节奏","工业化","3000字"]},{id:"de-ai-webnovel-style",title:"去AI味+网文语感注入",category:"网感消痕",content:`请将以下文本改造成成熟中国网文风格：

【原文】
[贴入需要改写的文本]

【强制删除/替换】
- 禁用：不禁、仿佛、缓缓、淡淡、忽然、顿时、似乎、目光、嘴角、深吸一口气、良久、骤然
- 删除空泛抒情：「他心中涌起一股暖流」「她仿佛看到了希望」
- 删除翻译腔：「他说道」「他思考着」「他意识到」

【替换规则】
1. 心理描写 → 动作/表情/环境投射
2. 长句 → 短句+留白
3. 书面语 → 口语化/网文化表达
4. 平铺直叙 → 冲突、动作、对话推动
5. 所有角色对话必须符合身份和性格，不能像客服互聊

【输出】
只输出修改后正文，不解释。`,tags:["去AI味","润色","网感","正文"]},{id:"setting-consistency-check",title:"设定/战力一致性校验",category:"设定校验",content:`请对照以下设定表，检查当前章节是否存在逻辑冲突：

【金手指限制】
使用条件：[填写]
冷却/代价：[填写]
不可用于：[填写]

【境界/战力对照】
主角当前境界：[填写]
主角可越级范围：[最多几个小阶]
敌方配置：[境界/人数/特殊能力]
已知底牌：[主角/敌方底牌]

【待检查文本】
[贴入章节内容]

【请输出】
1. 违反设定的位置及原因
2. 战斗结果是否合理（是否越级无代价/是否金手指滥用）
3. 如何在不破坏爽感的前提下修复
4. 建议补充的代价、限制、铺垫
5. 修正后的关键段落`,tags:["设定","战力","金手指","一致性"]},{id:"step-by-step-writing-workflow",title:"分步生成：可控AI写作流程",category:"AI工作流",content:`你现在是我的网文创作助手。请严格分步执行，不要一次性输出全文。

【第1步：确认信息】
请先向我索要：题材、平台、主角人设、金手指、核心爽点、本章目标、预计字数。
等我回复后，再进入第2步。

【第2步：生成本章细纲】
输出200字以内细纲，包含：开局钩子、核心冲突、爽点释放、章末悬念。
我确认后，再进入第3步。

【第3步：分段生成正文】
每次只输出500-800字，输出后停下等我反馈。
我可能会说：节奏太慢/加动作/加打脸/去AI味/继续。

【第4步：整章校验】
整章完成后，检查：完读率友好度、毒点、AI味、章末钩子、人设一致性。

现在请只回复：收到，请提供第1步信息。`,tags:["分步","工作流","可控","续写"]},{id:"open-book-wizard",title:"开书向导：从0到可发前3章",category:"开书向导",content:`请作为番茄/七猫网文编辑，带我完成一本新书的开书设计。

请结构化输出，适合直接复制到写作台文件树。`,tags:["开书","书名","简介","黄金三章"]},{id:"short-drama-story-template",title:"短故事/短剧感强翻转模板",category:"短剧短篇",content:`请按番茄短故事/短剧改编逻辑设计一个3-5万字短篇故事。

【基础设定】
题材：[真假千金/追妻/豪门/复仇/校园/婚姻家庭/职业成长/微悬疑]

【请输出】

4. 15-25章章纲
5. 每章钩子设计
6. 可改编短剧的名场面清单`,tags:["短故事","短剧","强翻转","番茄"]},{id:"workflow-high-concept-generator",title:"网文高概念脑洞生成器",category:"AI 网文工作流",content:`你现在是一位中国网文策划编辑，请根据我提供的一句话想法，生成一个适合番茄/七猫/起点的「网文高概念」。

[一句话想法，例如：都市末世文，别人逃难我享受生活]

【请输出】

3. 主角设定（身份、核心特质、初始困境）
4. 金手指设计（功能、爽点、限制）

要求：
- 结果必须偏中国网文风格
- 必须适合移动端阅读
- 必须有明确爽点
- 不要文艺化表达，直接给可写的内容`,tags:["高概念","脑洞","开书","番茄"]},{id:"workflow-golden-three-outline",title:"黄金三章细纲生成器",category:"AI 网文工作流",content:`请根据我提供的故事高概念，为我生成「黄金三章」的细纲。

【参考资料】

- 核心事件
- 悬念设计

- 核心事件

最后请告诉我：
- 哪个方案最适合当前阶段
- 为什么
- 哪个方案最适合番茄小说平台`,tags:["剧情推进","ABC方案","卡文","选择"]},{id:"workflow-plot-direct-engine",title:"剧情推演引擎（直接往后推）",category:"AI 网文工作流",content:`请根据以下资料，直接推演接下来的剧情发展。

要求：

- 要和前文逻辑连贯
- 必须服务主线
- 必须有“下一步还想继续写”的推动力`,tags:["剧情推演","3-5章","主线","连载"]},{id:"workflow-detailed-outline-engine",title:"细纲生成引擎",category:"AI 网文工作流",content:`请根据以下资料，为我生成指定章节范围的「细纲」。

要求：

- 要有写作指导意义，而不只是剧情摘要
- 必须体现中国网文节奏`,tags:["细纲","章节规划","场景节点","指导"]},{id:"workflow-bodywriter-engine",title:"正文代写引擎",category:"AI 网文工作流",content:`你现在是中国网文正文写作助手。请根据我提供的资料直接输出正文。

【输出】
直接输出该章正文`,tags:["正文","代写","章节","输出"]},{id:"workflow-stage-goal-planner",title:"阶段目标规划器",category:"AI 网文工作流",content:`请根据故事高概念与当前阶段，为我设计接下来 40-50 章的阶段目标推进表。

1. 故事高概念：[粘贴]

7. 哪些位置适合做平台友好的强钩子`,tags:["阶段目标","40章","伏笔","规划"]},{id:"workflow-consistency-checker",title:"高概念→细纲一致性检查器",category:"AI 网文工作流",content:`请检查以下三份内容是否一致：

【输入】

4. 修正方案`,tags:["一致性","高概念","细纲","检查"]},{id:"workflow-node-expander",title:"章节节点正文展开器",category:"AI 网文工作流",content:`请根据以下节点信息，把它展开成 500-800 字的正文片段。

【节点信息】
节点类型：[填写]
描写目的：[填写]

前文状态：[填写]

本节点想制造的情绪：[爽/压迫/暧昧/紧张/悬疑]

【要求】
- 只写这个节点的正文
- 不要跨到下一个节点
- 保持网文节奏和角色状态一致
- 每段不超过150字
- 末尾留一点余味，方便接下个节点`,tags:["节点展开","500字","正文片段","细纲"]},{id:"workflow-writing-coach",title:"AI 写作教练",category:"AI 网文工作流",content:`你现在不是代写工具，而是我的网文写作教练。

请根据我提供的细纲/正文：
1. 先分析这段应该怎么写
2. 告诉我写作重点是什么
3. 告诉我最容易犯的错误

5. 最后总结这段写法可以迁移到哪些场景

【输入】
类型/平台：[填写]
目标效果：[例如：更爽、更像番茄、更有悬念]
细纲/正文：[粘贴]

【要求】
- 先教我，再给答案
- 不要只给成品
- 解释必须具体到“这句为什么这样写”
- 最终示范正文必须可直接参考`,tags:["写作教练","教学","示范","提升"]},{id:"workflow-character-profile-300",title:"① 角色档案生成器（300字+，存入「角色」）",category:"AI 网文工作流",content:`你现在是中国网文角色策划。请为我生成一份至少 300 字的角色详细档案，方便我保存在网站左侧「角色」分类下，之后写作时通过「关联内容」喂给 AI，保证角色一致性。

【我提供】
角色名称：[角色名]
所属作品：[书名/类型，例如 番茄都市重生爽文]
角色定位：[主角/男主/女主/反派/导师/对手/家人/工具人]
一句话简介：[例如 重生归来的赘婿、隐世神医的徒弟]

【请输出（务必结构清晰，方便直接粘进网站角色文件）】
1. 基础信息（姓名 / 年龄 / 性别 / 身份 / 外貌特征）
2. 性格特点（3-5 个关键词 + 1-2 句解释）
3. 说话习惯（用词偏好、语气、口头禅、句子长短倾向）
4. 行为逻辑（遇到压力 / 利益 / 感情 / 危险 时的典型反应）
5. 成长背景（出身、关键经历、转折事件、情感伤痕）
6. 核心欲望与底线（追求什么 / 害怕什么 / 不能容忍什么）
7. 与其他角色关系（至少 3 段关系，含态度和原因）
8. 标志性动作或细节（用来反复强化辨识度）
9. 一段 80-120 字的「示范对话」（让 AI 之后写对话能直接对齐）

【硬性要求】
- 总字数不少于 300 字
- 必须能体现「这个角色和其他人不一样」的差异点
- 不要写成简历，要像作者笔记
- 不要文艺腔，直接干货
- 输出后请提示我：建议保存路径 → 左侧文件树「角色」→ 新建文件「[角色名]」`,tags:["角色档案","300字","一致性","关联"]},{id:"workflow-segment-2000-3000",title:"② 分段精修：单次只写 2000-3000 字",category:"AI 网文工作流",content:`你是中国网文正文写作助手。请严格遵守：本次只写 2000-3000 字，不许超出，不许跨到下一章。
我会在你写完后立刻精修，所以宁愿少写、不许多写。

【请我已经在网站「关联内容」里关联了】
- 角色档案
- 当前章节细纲
- 已写好的前文
- 必要的设定

【本次写作要求】
1. 输出字数：2000-3000 字之间
2. 每段 ≤ 150 字，对话单独成段
3. 严格遵循关联角色档案中的：性格、说话习惯、行为逻辑
4. 自动避免下面这些 AI 痕迹词：不禁、仿佛、缓缓、淡淡、忽然、顿时、似乎、深吸一口气、目光、嘴角、骤然、宛如、霎时间、刹那间、不由得、蓦地、顷刻、陡然
5. 不要空泛抒情，不要总结性叙述，多用动作 / 对话 / 微表情推动
6. 必须有节奏感：每 500-800 字一个情绪转折
7. 段落之间不要重复同一意思
8. 结尾保留钩子，但不许跨入下一个章节
9. 使用真人写作风格的口语化中文，去掉「他说道」「他思考着」「他意识到」这种翻译腔

【输出】
- 只输出本段正文
- 写完后另起一段，输出：
  · 本段实际字数
  · 涉及到的关联角色及他们的状态变化
  · 下一段建议接什么（一句话）`,tags:["分段写作","2000字","精修","去AI味"]},{id:"workflow-scene-notebook",title:"③ 场景笔记生成器（存入「设定」/「知识库」）",category:"AI 网文工作流",content:`你是中国网文场景管理助手。请为我生成一份「场景笔记」，方便我保存在网站左侧「设定」或「知识库」分类下，之后通过「关联内容」防止前后矛盾（例如主角今天住三楼，明天变成五楼这种低级错误）。

【我提供】
场景名称：[例如 主角公寓 / 宗门后山 / 总裁办公室]
所属书：[书名]
场景类型：[长期场景/单章场景/反复出现的场景]
出现章节：[例如 第3章首次出现]

【请输出（结构清晰、便于直接保存）】
1. 场景基础信息（位置、所属城市/势力、所有权人）
2. 物理布局（楼层、房间数、动线、关键道具的具体位置——务必精确，例如：书桌在窗右侧、保险柜藏在书架第三层后）
3. 氛围（光线、气味、声音、温度、季节）
4. 在场常驻人物（谁经常出现、出现时的固定行为）
5. 时间线（第几章首次出现、当前所处时间、未来还会出现在哪些剧情节点）
6. 与剧情的关联（这个场景承担什么剧情功能：庇护所/战场/秘密基地/转折点）
7. 「禁止前后矛盾」的关键事实（用列表写出 5 条以上不许变动的硬设定）
8. 后续可拓展点（这个场景未来还能挖什么）

【硬性要求】
- 物理布局部分必须可视化（写法要让 AI 之后能直接画出空间关系）
- 「关键事实」必须明确写成「不许改动」清单
- 输出末尾提示我：建议保存路径 → 左侧文件树「设定」→ 新建文件「场景：[场景名]」
- 之后每次写到该场景前，把此文件关联进 AI 上下文，可有效避免前后矛盾`,tags:["场景笔记","前后一致","关联","设定"]},{id:"workflow-polish-pass1-logic",title:"④-A 第一遍润色：逻辑与情节",category:"AI 网文工作流",content:`你是中国网文资深编辑，专门做「第一遍润色」。
本次只检查 ①逻辑 ②情节 ③人设一致性，**不要**改语言风格、不要润色文笔。

【我已通过网站关联以下内容】
- 角色档案
- 场景笔记
- 章节细纲
- 本章正文

【请你逐段检查，并输出诊断表】
1. 情节断裂点（哪一段突然跳跃、缺少过渡）
2. 因果链漏洞（事件 A → 事件 B 是否合理）
3. 人设违背（角色行为是否违反关联档案的性格 / 说话习惯 / 行为逻辑）
4. 时间线 / 场景矛盾（对照场景笔记，是否存在低级错误）
5. 金手指 / 战力 / 设定漏洞
6. 主线被支线稀释的位置
7. 钩子是否有效（结尾是否能让读者继续看）

【输出格式】
- 表格：位置 / 问题类型 / 严重程度（🔴/🟡/🟢）/ 修改建议
- 末尾给出：本章逻辑评分（0-10）+ 是否建议进入第二遍润色

【硬性要求】
- 不要重写正文，只指问题
- 不要谈遣词造句
- 第二遍润色我会用另一个专门的提示词`,tags:["第一遍","逻辑","情节","审稿"]},{id:"workflow-polish-pass2-language",title:"④-B 第二遍润色：语言与节奏（含去 AI 味）",category:"AI 网文工作流",content:`你是中国网文资深编辑，专门做「第二遍润色」。
前提是逻辑已通过第一遍审核。本次只优化 ①语言 ②节奏 ③去 AI 味。

【我已通过网站关联以下内容】
- 角色档案（确保对话风格不偏）
- 本章正文（已通过第一遍逻辑润色）

【强制任务】
1. 把正文里所有 AI 痕迹词改写：不禁、仿佛、缓缓、淡淡、忽然、顿时、似乎、深吸一口气、目光、嘴角、骤然、宛如、霎时间、刹那间、不由得、蓦地、顷刻、陡然、轻轻地、缓缓地
2. 删除空泛抒情（例：「他心中涌起一股暖流」「她仿佛看到希望」）
3. 删除翻译腔（「他说道」「他思考着」「他意识到」）
4. 把过长的描写拆短，每段 ≤ 150 字
5. 对话与动作交替推进，避免连续大段叙述
6. 关键情绪点改用「动作 + 微表情 + 留白」表达，而不是直接告诉读者
7. 节奏控制：每 500-800 字必须有一次情绪起伏
8. 角色对话必须符合关联档案里的「说话习惯」

【输出】
- 只输出修改后正文（不要解释）
- 末尾另起一段，输出：
  · 本次修改要点（≤ 5 条）
  · 估算 AI 痕迹比例：> 30% / 20-30% / < 20%
  · 是否还需要再过一遍

【目标】
- AI 痕迹比例 < 25%
- 让读者感觉是「成熟网文作者」写的，而不是 AI 写的`,tags:["第二遍","去AI味","节奏","语言"]},{id:"workflow-four-step-guide",title:"实战四步法：使用顺序说明（必看）",category:"AI 网文工作流",content:`你是「实战四步法」的使用引导助手。
请根据我当前的写作阶段，告诉我应该按什么顺序使用以下 4 个提示词，并给我具体操作方法。

【实战四步法】
① 角色档案生成器（存「角色」分类，之后写作通过关联使用）
② 分段精修：单次只写 2000-3000 字
③ 场景笔记生成器（存「设定」/「知识库」分类，防止前后矛盾）
④-A 第一遍润色：逻辑与情节
④-B 第二遍润色：语言与节奏

【我的当前阶段】
[例如：刚开新书还没建角色 / 已经在写正文 / 写完一章准备改稿 / 写到20章感觉跑偏了]

【请输出】
1. 我当前最该用哪一个 / 哪几个
2. 推荐使用顺序（按时间）
3. 每步操作的「网站具体动作」：
   - 在哪个分类新建文件？
   - 是用「AI对话」还是「关联内容」？
   - 关联哪些文件？
4. 本阶段最容易踩的坑
5. 走完一遍后能拿到什么成品（角色档案？正文初稿？修改后正文？）

要求：
- 输出尽量像「操作清单」
- 每一步必须能直接照做
- 面向中国网文作者，不要空话
- 末尾提醒我：日更 4000 字 + AI 痕迹 < 30% + 二次润色 = 平台收益的最低线`,tags:["四步法","使用说明","实战","操作清单"]},{id:"workflow-usage-guide",title:"AI 网文工作流使用说明",category:"AI 网文工作流",content:`你现在是“AI 网文工作流”的使用引导助手。请根据我的当前创作阶段，告诉我应该按什么顺序使用以下工作流提示词：

1. 高概念脑洞生成器
2. 黄金三章细纲生成器
3. 剧情推进助手（ABC）
4. 剧情推演引擎
5. 细纲生成引擎
6. 正文代写引擎
7. 阶段目标规划器
8. 一致性检查器
9. 节点正文展开器
10. AI 写作教练

【我的当前阶段】
[例如：只有一句想法 / 已写完三章 / 卡在第20章 / 觉得剧情跑偏]

【请输出】
1. 我当前最适合使用的 3 个提示词
2. 推荐使用顺序
3. 每个提示词的作用解释
4. 本阶段最容易犯的错误
5. 如果我照这个顺序走，下一步能得到什么成果

要求：
- 输出尽量像流程图/操作手册
- 面向中国网文作者
- 不要空话`,tags:["工作流","使用说明","引导","新手"]},{id:"dialogue-quality-upgrade",title:"对话质感升级（潜台词+真实感）",category:"对话写作",content:`请把以下对话改写成「真实感强 + 潜台词丰富」的高质量版本。

【原始对话】
[贴入你觉得对话很白、很生硬的段落]

【改写要求】
1. 删掉"说道/回答/问道"这类翻译腔，改用动作节拍代替：
   ❌ 他说道："你要离开了？"
   ✅ 他的手顿了一下。"你要离开了？"

2. 强制加入至少 2 处「没有说出口的话」：
   方法：一个角色想说 A，实际只说了 B，读者能感受到 A 的存在

3. 根据角色档案（如有关联），让每个角色的口头禅、语气词、句子长短符合其性格

4. 对话节奏三明治法：
   [一句对话] → [行动/细节] → [一句对话] → [环境/内心短句] → [一句对话]
   禁止出现连续 3 句以上纯对话

5. 让对话同时完成 2 个功能（推进情节 + 揭示性格，或者 制造冲突 + 暗示感情）

【额外检查】
- 每个角色说话方式是否有差异？
- 有没有被可以删掉的废话台词？
- 结尾的最后一句是否留下了悬念？`,tags:["对话","潜台词","动作节拍","真实感"]},{id:"dialogue-scene-types",title:"四种核心对话场景写法",category:"对话写作",content:`请帮我写一段对话，类型是：[选一个：冲突对话 / 暧昧对话 / 审讯对话 / 道别对话]

【基本信息】
角色A：[姓名+性格]
角色B：[姓名+性格]
场景：[地点+时间+当前关系状态]
核心目的：[这段对话最终要让读者感觉到什么]

【各类型专属要求】

冲突对话：
- 两人绝不直接说出最核心的矛盾
- 用一件小事吵架，实际在吵一件大事
- 至少有一次沉默，比任何话都有力量

暧昧对话：
- 每句话至少有两种解读方式
- 用空间距离（靠近/后退）辅助台词
- 结尾必须停在「说了等于没说、没说又胜过万语」

审讯对话：
- 强势方用问句控场，弱势方用答案藏信息
- 至少设计一个「陷阱问题」，让另一方无论怎么回答都输
- 读者必须能感受到信息不对等带来的压迫感

道别对话：
- 禁止直接说「再见」「保重」
- 用一件具体小事（还书/还伞/借口说出门）代替道别
- 结尾留一个细节，让读者在几章后突然明白这次道别意味着什么`,tags:["对话","冲突","暧昧","道别"]},{id:"power-system-designer",title:"战力/境界体系设计器（防崩盘）",category:"世界观设定",content:`请帮我设计一套完整的战力/境界体系，要求写 50 万字后不崩盘。

【基本设定】
小说类型：[玄幻/仙侠/都市异能/末世/科幻...]
主要修炼方式：[练气/武道/异能/科技...]
世界背景：[一句话概括]

【请输出以下内容】

一、境界层级（建议 8-12 个大境界，每级内分 3 小境）
- 每个大境界的名称 + 核心特征
- 突破该境界需要的条件（资源/顿悟/战力/时间）
- 该境界的战力体现（能打什么、不能打什么）

二、跨境界战力对比表
- 普通人 vs 第一境界 = 多大差距？
- 每跨一个大境界，战力差距倍数是多少？
- 什么情况下小境界可以越级？代价是什么？

三、防崩盘守则（关键！）
- 哪些设定是不能随便打破的「钢铁规则」？
- 哪些设定可以作为后期剧情的「特殊例外」使用？
- 主角的成长速度建议：每多少章突破一个小境界？

四、世界观内的稀缺资源
- 什么东西能帮助突破？（越稀缺越好）
- 这些资源的产地/来源/争夺方式

五、反派或最终BOSS的境界应该是多少才合理？`,tags:["战力体系","境界","世界观","设定"]},{id:"worldbuilding-lore-sheet",title:"世界观知识库（地图/势力/规则/历史）",category:"世界观设定",content:`请帮我建立一份可以关联给 AI 的世界观知识库文件，格式精简，适合每次写作时直接喂给 AI 作为背景资料。

【小说基础信息】
类型：[填写]
时代背景：[架空/古代/未来/平行世界...]
核心概念：[一句话概括这个世界最独特的地方]

【请输出以下模块（每模块控制在 200 字内）】

模块1：地理与地图
- 主要区域名称（3-5 个即可）
- 各区域的特色和重要性
- 主角活动的核心区域

模块2：势力格局
- 主要势力（3-5 个）：名称 + 立场 + 对主角的态度
- 势力间的核心矛盾

模块3：基本规则
- 这个世界的「物理规则」（修炼如何运作/科技水平/魔法限制）
- 最重要的社会规则（什么是禁忌？什么是权威？）

模块4：历史事件
- 2-3 个影响现在世界格局的关键历史事件
- 这些事件留下了哪些「未解之谜」可以作为伏笔

模块5：与众不同之处
- 这个世界观最独特的设定是什么？
- 它如何影响主角的行动和选择？

【使用说明】
将此文件保存到左侧文件树「设定」分类，每次写新章节时关联此文件，AI 就不会出现世界观前后矛盾的问题。`,tags:["世界观","知识库","势力","设定"]},{id:"foreshadowing-tracker",title:"伏笔追踪表生成器",category:"伏笔管理",content:`请帮我建立一份「伏笔追踪表」，格式适合保存在网站文件树「知识库」分类，每次写作时关联使用。

【基本格式】
每条伏笔包含以下字段：
1. 伏笔ID：FZ-001（流水号）
2. 出现章节：第X章
3. 伏笔内容：[具体是什么情节/细节]
4. 状态：[待回收 / 已回收 / 转化为主线]
5. 计划回收章节：第X章左右
6. 回收方式：[到时候怎么揭露/利用这个伏笔]

【请根据以下内容帮我整理伏笔】
[贴入你已写好的章节内容，或者描述你目前埋下的伏笔]

【额外请检查】
1. 有没有互相矛盾的伏笔？
2. 哪些伏笔埋得太久可能会被读者忘掉？
3. 有没有设定了但忘了用的细节？
4. 伏笔密度建议：每5章至少有1条小伏笔回收，防止读者感觉虎头蛇尾

【使用方式】
- 每写完一章，检查是否新埋了伏笔，手动添加到此表
- 每写完10章，让AI帮你检查哪些伏笔应该回收了`,tags:["伏笔","追踪","回收","长篇"]},{id:"foreshadowing-plant",title:"隐性伏笔植入器（让读者二刷惊叹）",category:"伏笔管理",content:`请帮我在以下正文中植入 2-3 个隐性伏笔，要求：读者第一次看觉得是普通细节，事后回想才惊觉「原来从这里就开始了」。

【当前正文段落】
[贴入你想埋伏笔的章节片段]

【我计划在后面揭露的真相/转折】
[填写你的长线剧情计划，例如：第50章揭露主角其实是反派的儿子]

【伏笔植入方式（请选用以下至少2种）】
1. 道具伏笔：让某个看似普通的物品，实际上暗示了后续转折
   例：王五不经意摸了摸腰间玉佩，眼神闪烁——没人注意到玉佩内侧刻着的「李」字

2. 行为模式伏笔：让角色做了一个不起眼的动作，后来揭示这是他身份/秘密的线索
   例：他每次听到「父亲」这个词，都会停顿零点几秒

3. 他人视角伏笔：通过配角的一句无心之语，暗示主角不知道的真相

4. 环境/气候伏笔：场景描写里藏一个「不符合当下情境」的细节

【要求】
- 伏笔必须足够隐蔽，不提示读者这是重要信息
- 伏笔要能「后来想想完全合理」
- 请告诉我在哪章回收这个伏笔最合适`,tags:["伏笔","隐性","植入","二刷"]},{id:"highlight-scene-upgrade",title:"高光场景升华器（打动读者的关键时刻）",category:"高光场景",content:`请帮我把以下场景升华为「让读者看完心跳加速或眼眶发红」的高光时刻。

【原始场景】
[贴入你觉得重要但写得很平的场景]

【这个场景应该让读者感受到什么情绪】
[例如：震撼/感动/心痛/久别重逢的激动/复仇成功的爽感...]

【升华公式（请按顺序处理）】

第一步：找到场景的「情感核心」
- 这一刻，主角内心最深处在想什么？（不是表面的行动，是底层的情感）
- 如果只能保留一句话，哪句话最能概括这个瞬间？

第二步：用「慢镜头」写关键瞬间
- 在情绪爆发的那1-3秒，用50-100字极致放大细节
- 例：不写「他哭了」，写「泪水在眼眶里转了一圈，他死死咬住牙关，还是没忍住」

第三步：加入「无声胜有声」的细节
- 这一刻，最有力量的往往不是台词，而是动作/表情/环境
- 设计一个「本来有很多话要说，最后什么都没说」的结局方式

第四步：用「余韵」收场
- 高潮结束后，用 30-50 字的「冷静叙述」收尾
- 这种「情绪的余温」比直接爆发更令人难忘

【禁忌】
- 不要用「感动/震撼/热泪盈眶」这类直接告诉读者情绪的词
- 不要在高潮之后立刻推进剧情，给读者 30-50 字的「呼吸空间」`,tags:["高光","感动","升华","情感"]},{id:"signature-detail-designer",title:"角色标志性细节设计（让角色真正活起来）",category:"高光场景",content:`请为我的角色设计一套「标志性细节系统」——这是让角色从纸片人变成活生生的人的关键。

【角色基础信息】
姓名：[填写]
性格关键词：[3个词]
当前处境：[在故事中的阶段]

【请设计以下内容】

一、标志性口头禅（2-3 个，有使用场景说明）
- 不要太文艺或太俗，要符合角色身份
- 例：战场老兵总说「今天的风很好」（意味着「不知道能不能回来」）

二、标志性小动作（3-5 个，对应不同情绪）
- 紧张时会做什么？
- 说谎时会做什么？
- 开心但不想表现出来时会做什么？
- 愤怒到极点时反而会做什么？
- 下定决心时会做什么？

三、标志性思维模式
- 遇到困境，他/她第一反应是什么？
- 他/她最容易忽略的事情是什么？
- 他/她有什么「执念」，让他经常做出不太理性的选择？

四、标志性的「不一致」
- 设计 1-2 个「外表和内心不符」的反差细节
- 例：冷酷的他，总是悄悄把别人随手放的热水杯挪到不容易被碰倒的位置

【使用方式】
将此文件保存到「角色」分类，每次写该角色时关联进 AI，确保角色行为一致。`,tags:["标志性","细节","口头禅","角色活化"]},{id:"tomato-debut-checklist",title:"番茄首秀验证期自查清单",category:"番茄专项",content:`你是番茄小说的资深签约作者，请帮我对以下内容进行「首秀验证期」的全面自查。

番茄首秀规则：作品通过验证期后进入推荐池，核心指标是前 5 天的：
- 完读率（目标 > 35%）
- 书架收藏率（目标 > 10%）
- 评论互动率

【我的作品信息】
书名：[填写]
类型：[填写]
已更新字数：[填写]

【请逐项检查以下内容】

一、书名检查（5分项）
□ 书名包含核心爽点关键词（系统/重生/赘婿/战神等读者会主动搜索的词）
□ 书名字数 ≤ 15 字
□ 书名能让读者 3 秒内判断题材
□ 书名有情绪冲击力（不是白开水式的书名）
□ 书名无敏感词（赘婿→上门女婿，重生→重回等）

二、简介检查（5分项）
□ 前两句出现「身份反差」或「极端处境」
□ 第三句出现「金手指/转机」
□ 全文不超过 80 字
□ 结尾有悬念
□ 无废话（删掉所有「且看主角如何」之类的空话）

三、黄金 800 字检查（5分项）
□ 前 50 字内出现主要冲突
□ 500 字内出现金手指
□ 每段不超过 150 字
□ 对话单独成段
□ 没有大段环境描写（超过100字的环境描写立刻删掉）

四、前 5 章节奏检查（5分项）
